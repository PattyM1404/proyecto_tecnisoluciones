{% extends "base.html" %}
{% block content %}

<h2>Editar Cliente</h2>

<form action="/actualizar_cliente/{{ cliente[0] }}" method="POST">

    <input type="text" name="nombre" value="{{ cliente[1] }}" required><br><br>

    <input type="email" name="email" value="{{ cliente[2] }}" required><br><br>

    <input type="text" name="telefono" value="{{ cliente[3] }}" required><br><br>

    <button type="submit">Actualizar</button>

</form>

<br>
<a href="/clientes">Volver</a>

{% endblock %}
