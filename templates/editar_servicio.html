{% extends "base.html" %}

{% block content %}
<h2>Editar Servicio</h2>

<form action="/actualizar_servicio/{{ servicio.id }}" method="POST">
    <input type="text" name="nombre" value="{{ servicio.nombre }}" required>
    <input type="text" name="descripcion" value="{{ servicio.descripcion }}" required>
    <input type="number" step="0.01" name="precio" value="{{ servicio.precio }}" required>
    <input type="text" name="duracion" value="{{ servicio.duracion }}" required>
    <button type="submit">Actualizar</button>
</form>

{% endblock %}
