{% extends "base.html" %}
{% block content %}

<h2>Servicios</h2>

<!-- BOTÓN PDF -->
<a href="/reporte_servicios">
    <button>Generar Reporte PDF</button>
</a>

<br><br>

<form action="/agregar_servicio" method="POST">
    <input type="text" name="nombre" placeholder="Nombre" required><br><br>
    
    <input type="text" name="descripcion" placeholder="Descripción" required><br><br>
    
    <input type="number" step="0.01" name="precio" placeholder="Precio" required><br><br>
    
    <input type="text" name="duracion" placeholder="Duración" required><br><br>
    
    <button type="submit">Guardar</button>
</form>

<hr>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Duración</th>
        <th>Acciones</th>
    </tr>

    {% for s in servicios %}
    <tr>
        <td>{{ s[0] }}</td>
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>{{ s[3] }}</td>
        <td>{{ s[4] }}</td>
        <td>
            <a href="/editar_servicio/{{ s[0] }}">Editar</a> |
            <a href="/eliminar_servicio/{{ s[0] }}">Eliminar</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
